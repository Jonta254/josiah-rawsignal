name: CI — Build & Type Check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Prevent telemetry during CI
          NEXT_TELEMETRY_DISABLED: 1

      - name: Check bundle size
        run: |
          BUILD_SIZE=$(du -sh .next/static 2>/dev/null | cut -f1 || echo "N/A")
          echo "Static bundle size: $BUILD_SIZE"

  lighthouse:
    name: Lighthouse Audit (preview)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json
        continue-on-error: true   # Informational only, doesn't block merge
